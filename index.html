<!DOCTYPE html>
<html lang="nl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Select</title>

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:#101010;
overflow:hidden;
font-family:Arial;
}

/* TV */
#tv{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:96vw;
height:94vh;
padding:12px;
box-sizing:border-box;
border-radius:18px;
background:linear-gradient(
135deg,
#444,#d8d8d8,#777,#222,#999,#555);
}

/* Menu */
#menu{
display:flex;
justify-content:space-evenly;
align-items:center;
width:100%;
height:100%;
background:#000;
border-radius:10px;
}

.card{
width:30%;
cursor:pointer;
transition:.25s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
border-radius:10px;
display:block;
}

.title{
color:white;
font-size:22px;
padding-top:10px;
text-align:center;
}

/* Player */
#player{
display:none;
position:relative;
width:100%;
height:100%;
background:#000;
border-radius:10px;
}

#ytplayer{
position:absolute;
inset:0;
width:100%;
height:calc(100% - 40px);
}

/* Seekbar */
#seek{
position:absolute;
left:0;
bottom:0;
width:100%;
height:40px;
cursor:pointer;
}

/* Back button */
#back{
position:absolute;
top:18px;
left:18px;
z-index:999;
display:none;
padding:10px 20px;
background:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

/* CC button */
#ccbtn{
position:absolute;
top:18px;
left:110px;
z-index:999;
display:none;
padding:10px 14px;
background:white;
border:none;
border-radius:8px;
font-size:14px;
cursor:pointer;
}

#ccbtn.active{
background:lightgreen;
}

</style>

</head>

<body>

<div id="tv">

<button id="back" onclick="showMenu()">← Back</button>
<button id="ccbtn" onclick="toggleCC()">CC</button>

<div id="menu">

<div class="card" onclick="playVideo('8lP5EO1OzMQ')">
<img src="https://hosting.photobucket.com/bc02da2e-8afb-4b69-a4bf-9332cae392c5/9933bd4c-3678-4dd3-b1c7-ff16ffb36732.jpg">
<div class="title">Plien en Bianca</div>
</div>

<div class="card" onclick="playVideo('nkH88hirVJc')">
<img src="https://img.youtube.com/vi/nkH88hirVJc/maxresdefault.jpg">
<div class="title">Youp van 't Hek</div>
</div>

<div class="card" onclick="playVideo('DScMGYxhvwU')">
<img src="https://hosting.photobucket.com/bc02da2e-8afb-4b69-a4bf-9332cae392c5/ccb6b73e-8ba6-4001-a7b5-a53712e155aa.jpg">
<div class="title">Karin en Angela</div>
</div>

</div>

<div id="player"></div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

let player;
let timer;
let ccOn = false;

function playVideo(id){

document.getElementById("menu").style.display="none";
document.getElementById("back").style.display="block";
document.getElementById("ccbtn").style.display="block";
document.getElementById("player").style.display="block";

document.getElementById("player").innerHTML=`
<div id="ytplayer"></div>
<input type="range" id="seek" value="0" min="0" max="100">
`;

player = new YT.Player('ytplayer',{
videoId:id,
playerVars:{
autoplay:1,
controls:1,
rel:0,
cc_load_policy:0
},
events:{
onReady:onReady
}
});

}

function onReady(){

const seek=document.getElementById("seek");

timer=setInterval(()=>{

if(player && player.getDuration){
let d=player.getDuration();
if(d>0){
seek.value=(player.getCurrentTime()/d)*100;
}
}

},300);

seek.oninput=function(){
player.seekTo(player.getDuration()*(this.value/100),true);
};

}

function toggleCC(){

if(!player) return;

ccOn = !ccOn;

const btn = document.getElementById("ccbtn");

if(ccOn){

// probeer Nederlands / captions aan
player.loadModule("captions");

player.setOption("captions","track",{languageCode:"nl"});

btn.classList.add("active");

}else{

player.setOption("captions","track",null);

btn.classList.remove("active");

}

}

function showMenu(){

clearInterval(timer);

if(player){
player.destroy();
}

document.getElementById("player").innerHTML="";
document.getElementById("player").style.display="none";
document.getElementById("back").style.display="none";
document.getElementById("ccbtn").style.display="none";
document.getElementById("menu").style.display="flex";

}

</script>

</body>
</html>
